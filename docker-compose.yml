version: "3.9"

services:
  database:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: calcom
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  calcom:
    image: calcom/cal.com:latest
    restart: unless-stopped
    depends_on:
      - database
    environment:
      # Required
      DATABASE_URL: postgresql://calcom:${POSTGRES_PASSWORD}@database:5432/calcom
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
      NEXTAUTH_URL: https://londoncardiologyclinic.uk/booking

      # Stripe (for paid bookings)
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
      PAYMENT_FEE_FIXED: 0
      PAYMENT_FEE_PERCENTAGE: 0

      # Email (via Proton SMTP bridge or generic SMTP)
      EMAIL_FROM: drmahmoodclinic@pm.me
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}

      # App config
      NEXT_PUBLIC_WEBAPP_URL: https://londoncardiologyclinic.uk/booking
      NEXT_PUBLIC_WEBSITE_URL: https://londoncardiologyclinic.uk
      CALCOM_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"

volumes:
  pgdata:
